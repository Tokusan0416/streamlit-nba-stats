# GCPで作成したサービスアカウントのJSONキーを、secrets.tomlとして保存する

[gcp_service_account]
type = "service_account"
project_id = "XXXXXXXXXXXX"
private_key_id = "XXXXXXXXXXXX"
private_key = "-----BEGIN PRIVATE KEY-----XXXXXXXXXXXX-----END PRIVATE KEY-----"

client_email = "XXXXXXXXXXXX.iam.gserviceaccount.com"
client_id = "XXXXXXXXXXXX"
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "XXXXXXXXXXXX"
universe_domain = "googleapis.com"